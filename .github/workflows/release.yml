name: Release macOS App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x86_64
            runner: macos-latest

    env:
      TARGET_ARCH: ${{ matrix.arch }}
      # Apple 证书（用于签名）
      APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      # Apple 公证凭证
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

    steps:
    - uses: actions/checkout@v6
      with:
        token: ${{ secrets.GH_PAT }}
        submodules: recursive
        lfs: true

    # ── arm64: 常规 Python 安装 ──
    - name: Set up Python 3.11 (arm64)
      if: matrix.arch == 'arm64'
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    # ── x86_64: 通过 Rosetta 2 安装 x86_64 Python ──
    - name: Set up x86_64 Python via Rosetta 2
      if: matrix.arch == 'x86_64'
      run: |
        echo "🔧 Setting up x86_64 Python via Rosetta 2..."

        # 安装 Python.org universal2 安装包（包含 arm64 + x86_64 双架构）
        PYTHON_VERSION="3.11.11"
        curl -fSL "https://www.python.org/ftp/python/${PYTHON_VERSION}/python-${PYTHON_VERSION}-macos11.pkg" \
          -o /tmp/python.pkg
        sudo installer -pkg /tmp/python.pkg -target /
        rm /tmp/python.pkg

        PYTHON_FRAMEWORK="/Library/Frameworks/Python.framework/Versions/3.11/bin"

        # 验证 universal binary
        echo "=== Universal binary check ==="
        lipo -info "$PYTHON_FRAMEWORK/python3.11" || true

        # 用 arch -x86_64 创建 x86_64 虚拟环境
        arch -x86_64 "$PYTHON_FRAMEWORK/python3.11" -m venv "$RUNNER_TEMP/x86_64-venv"
        VENV="$RUNNER_TEMP/x86_64-venv"

        # 在 x86_64 环境中安装依赖（pip 会下载 x86_64 wheels）
        "$VENV/bin/python" -m pip install --upgrade pip
        "$VENV/bin/pip" install -r requirements.txt
        "$VENV/bin/pip" install pyinstaller

        # 验证架构
        echo "=== Architecture verification ==="
        "$VENV/bin/python" --version
        "$VENV/bin/python" -c "import platform; print(f'Arch: {platform.machine()}')"
        "$VENV/bin/python" -c "import PIL; print(f'PIL location: {PIL.__file__}')"

        # 将 x86_64 venv 加入 PATH（后续步骤自动使用）
        echo "$VENV/bin" >> $GITHUB_PATH
        echo "✅ x86_64 Python environment ready"

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Cache pip dependencies
      if: matrix.arch == 'arm64'
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-release-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-release-
          ${{ runner.os }}-pip-

    - name: Install Python dependencies (arm64)
      if: matrix.arch == 'arm64'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install frontend dependencies
      working-directory: frontend
      run: |
        npm ci

    - name: Import Apple certificate
      if: ${{ env.APPLE_CERTIFICATE_P12 != '' }}
      env:
        KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db
      run: |
        # 创建临时 keychain
        security create-keychain -p tempkey "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p tempkey "$KEYCHAIN_PATH"

        # 导入证书
        CERT_PATH="$RUNNER_TEMP/cert.p12"
        printf '%s' "$APPLE_CERTIFICATE_P12" | base64 -D > "$CERT_PATH"

        if [ ! -s "$CERT_PATH" ]; then
          echo "❌ Certificate file is empty or decode failed"
          exit 1
        fi

        security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k tempkey "$KEYCHAIN_PATH"

        # 设为默认 keychain（codesign 无需 --keychain 参数）
        security list-keychains -d user -s "$KEYCHAIN_PATH"
        security default-keychain -s "$KEYCHAIN_PATH"

        rm "$CERT_PATH"
        echo "✅ Certificate imported"

    - name: Generate build config
      if: ${{ env.APPLE_CERTIFICATE_P12 != '' }}
      run: |
        cat > scripts/build_config.json << EOF
        {
          "apple_id": "$APPLE_ID",
          "app_specific_password": "$APPLE_APP_PASSWORD",
          "team_id": "$APPLE_TEAM_ID",
          "signing_identity_hash": "$APPLE_SIGNING_IDENTITY"
        }
        EOF

    - name: Build and release
      run: |
        echo "=== Python environment ==="
        which python
        python --version
        python -c "import platform; print(f'Arch: {platform.machine()}')"
        echo "========================="

        if [ -f scripts/build_config.json ]; then
          python scripts/build_release.py --arch ${{ matrix.arch }}
        else
          TARGET_ARCH=${{ matrix.arch }} python scripts/build_mac.py
        fi

    - name: Get zip path
      run: |
        ZIP_PATH=$(ls dist/*.zip | head -1)
        echo "ZIP_PATH=$ZIP_PATH" >> $GITHUB_ENV

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        name: "TogoSpace ${{ github.ref_name }}"
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: ${{ env.ZIP_PATH }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
